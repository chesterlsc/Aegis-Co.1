name: Security regression

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install locked test dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run static security checks
        run: npm run security:static

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser security checks
        run: npm run security:browser

      - name: Upload browser report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-browser-report
          path: security-reports/playwright-results.json
          if-no-files-found: warn
          retention-days: 14
